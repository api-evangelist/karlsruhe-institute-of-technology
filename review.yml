  - date: '2026-06-03'
    rating: 3
    summary: >-
      KIT has a real but research-infrastructure-focused public API footprint
      rather than a consolidated developer portal. Verified live: the KITopen
      OAI-PMH endpoints (publikationen.bibliothek.kit.edu/oai and the dbkit base
      URL dbkit.bibliothek.kit.edu/oai, both returning valid OAI-PMH Identify
      responses with repository name "KITopen"); the dbkit framework page; the
      RADAR / RADAR4KIT REST Archive API (OAuth 2.0, documented by FIZ
      Karlsruhe, gated behind a requested client ID); and the SCC Shibboleth
      IdP. The RADAR production /radar/api/ base path returned 404 to an
      unauthenticated GET (expected — it requires OAuth and specific resource
      paths). No fabricated endpoints; only resources confirmed via live probe
      or official documentation are listed. KIT's open-source code is dispersed
      across many institute-level GitHub orgs (KIT-SCC, KIT-MRT, KIT-IAI, etc.)
      with no single official org.
